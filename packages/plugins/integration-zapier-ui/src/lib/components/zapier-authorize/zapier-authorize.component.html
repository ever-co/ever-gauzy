<nb-card class="card-scroll">
  <nb-card-header class="d-flex">
    <ngx-back-navigation></ngx-back-navigation>
    <h5>{{ 'MENU.ZAPIER' | translate }}</h5>
  </nb-card-header>
  <nb-card-body>
    <div class="col-xl-6 col-12">
      <div class="hint mb-4">
        <nb-icon icon="info-outline"></nb-icon>
        {{ 'INTEGRATIONS.ZAPIER_PAGE.CONNECT_INFO' | translate }}
      </div>
      <button
        nbButton
        status="primary"
        size="small"
        [disabled]="loading"
        (click)="connectToZapier()"
      >
        @if (loading) {
          <nb-icon icon="loader-outline" class="spin"></nb-icon>
        }
        {{ 'INTEGRATIONS.ZAPIER_PAGE.CONNECT_TO_ZAPIER' | translate }}
      </button>
    </div>
  </nb-card-body>
</nb-card>
