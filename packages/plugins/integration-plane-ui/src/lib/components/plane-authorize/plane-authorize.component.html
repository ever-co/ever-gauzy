<nb-card class="card-scroll">
	<nb-card-header class="d-flex">
		<button (click)="goBack()" nbButton status="primary" type="button" size="small" outline>
			<nb-icon icon="arrow-back-outline"></nb-icon>
		</button>
		<h5 class="ml-4">{{ 'INTEGRATIONS.PLANE_PAGE.TITLE' | translate }}</h5>
	</nb-card-header>

	<nb-card-body>
		<form class="col-xl-6 col-12" [formGroup]="form" (ngSubmit)="setupPlane()">
			<div class="form-group">
				<label class="label" for="planeWebUrl">
					{{ 'INTEGRATIONS.PLANE_PAGE.WEB_URL' | translate }} *
				</label>
				<input
					fullWidth
					id="planeWebUrl"
					formControlName="planeWebUrl"
					type="url"
					nbInput
					required
					autocomplete="url"
					[placeholder]="'INTEGRATIONS.PLANE_PAGE.WEB_URL_PLACEHOLDER' | translate"
				/>
			</div>
			<div class="form-group">
				<label class="label" for="planeAdminUrl">
					{{ 'INTEGRATIONS.PLANE_PAGE.ADMIN_URL' | translate }}
				</label>
				<input
					fullWidth
					id="planeAdminUrl"
					formControlName="planeAdminUrl"
					type="url"
					nbInput
					autocomplete="url"
					[placeholder]="'INTEGRATIONS.PLANE_PAGE.ADMIN_URL_PLACEHOLDER' | translate"
				/>
			</div>
			<div class="form-group">
				<label class="label" for="planeSpaceUrl">
					{{ 'INTEGRATIONS.PLANE_PAGE.SPACE_URL' | translate }}
				</label>
				<input
					fullWidth
					id="planeSpaceUrl"
					formControlName="planeSpaceUrl"
					type="url"
					nbInput
					autocomplete="url"
					[placeholder]="'INTEGRATIONS.PLANE_PAGE.SPACE_URL_PLACEHOLDER' | translate"
				/>
			</div>
			<div class="hint">
				<nb-icon icon="info-outline"></nb-icon>
				{{ 'INTEGRATIONS.PLANE_PAGE.SETUP_INFO' | translate }}
			</div>
			<button
				nbButton
				status="primary"
				type="submit"
				[disabled]="form.invalid || loading()"
				size="small"
				outline
			>
				@if (loading()) {
					<nb-icon icon="loader-outline"></nb-icon>
				}
				{{ 'BUTTONS.NEXT' | translate }}
			</button>
		</form>
	</nb-card-body>
</nb-card>
