<nb-card class="api-key-dialog">
	<nb-card-header class="d-flex align-items-center justify-content-between">
		<h6 class="mb-0">{{ 'INTEGRATIONS.PLANE_PAGE.API_KEY_DIALOG.TITLE' | translate }}</h6>
		<button nbButton ghost size="small" (click)="close()" aria-label="Close dialog">
			<nb-icon icon="close-outline"></nb-icon>
		</button>
	</nb-card-header>

	<nb-card-body>
		<p class="warning-text">
			<nb-icon icon="alert-triangle-outline" status="warning"></nb-icon>
			{{ 'INTEGRATIONS.PLANE_PAGE.API_KEY_DIALOG.WARNING' | translate }}
		</p>

		<div class="credential-group">
			<label class="label">{{ 'INTEGRATIONS.PLANE_PAGE.API_KEY_DIALOG.API_KEY' | translate }}</label>
			<div class="credential-row">
				<nb-icon icon="link-2-outline" class="link-icon"></nb-icon>
				<input
					nbInput
					fullWidth
					readonly
					[value]="apiKey"
					class="credential-input"
				/>
				<button
					nbButton
					ghost
					size="small"
					class="copy-btn"
					(click)="copyToClipboard(apiKey, 'key')"
					[nbTooltip]="apiKeyCopied() ? ('INTEGRATIONS.PLANE_PAGE.API_KEY_DIALOG.COPIED' | translate) : ('INTEGRATIONS.PLANE_PAGE.API_KEY_DIALOG.COPY' | translate)"
				>
					@if (apiKeyCopied()) {
						<nb-icon icon="checkmark-outline" status="success"></nb-icon>
					} @else {
						<nb-icon icon="copy-outline"></nb-icon>
					}
				</button>
			</div>
		</div>

		<div class="credential-group">
			<label class="label">{{ 'INTEGRATIONS.PLANE_PAGE.API_KEY_DIALOG.API_SECRET' | translate }}</label>
			<div class="credential-row">
				<nb-icon icon="lock-outline" class="link-icon"></nb-icon>
				<input
					nbInput
					fullWidth
					readonly
					[value]="apiSecret"
					class="credential-input"
				/>
				<button
					nbButton
					ghost
					size="small"
					class="copy-btn"
					(click)="copyToClipboard(apiSecret, 'secret')"
					[nbTooltip]="apiSecretCopied() ? ('INTEGRATIONS.PLANE_PAGE.API_KEY_DIALOG.COPIED' | translate) : ('INTEGRATIONS.PLANE_PAGE.API_KEY_DIALOG.COPY' | translate)"
				>
					@if (apiSecretCopied()) {
						<nb-icon icon="checkmark-outline" status="success"></nb-icon>
					} @else {
						<nb-icon icon="copy-outline"></nb-icon>
					}
				</button>
			</div>
		</div>
	</nb-card-body>

	<nb-card-footer class="d-flex justify-content-end">
		<button nbButton status="primary" size="small" outline (click)="close()">
			{{ 'BUTTONS.CLOSE' | translate }}
		</button>
	</nb-card-footer>
</nb-card>
