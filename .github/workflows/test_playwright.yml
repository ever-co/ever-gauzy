name: Playwright Tests

# Replaces the dormant Cypress workflows (test_cypress.yml / test_currents.yml, which trigger on
# branch `nope`). Runs the migrated Playwright e2e suite against a locally-started API + Web.
on:
  push:
    branches: [develop, feat/e2e-playwright]
  pull_request:
    branches: [develop]
  workflow_dispatch:

concurrency:
  group: ${{ github.ref }}-${{ github.workflow }}
  cancel-in-progress: true

jobs:
  e2e-playwright:
    runs-on: [self-hosted]
    timeout-minutes: 360

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Packages & Bootstrap
        run: yarn bootstrap

      - name: Build all packages
        shell: bash
        # Retry up to 2x: the Windows runner intermittently fails a single Angular package
        # build (ng-packagr file contention under parallelism). Nx's on-disk cache makes the
        # retry skip the already-built projects and only re-run the failed one (fast).
        run: |
          yarn build:package:all \
            || { echo "::warning::build:package:all failed — retry 1 (nx cache skips built projects)"; yarn build:package:all; } \
            || { echo "::warning::build:package:all failed — retry 2"; yarn build:package:all; }
        env:
          NX_NO_CLOUD: true
          # Self-hosted Windows runner: Nx isolated plugin workers fail to spawn
          # ("Failed to start plugin worker") → run plugins in-process and skip the daemon.
          NX_ISOLATE_PLUGINS: 'false'
          NX_DAEMON: 'false'

      - name: Generate dev config
        run: yarn config:dev

      - name: Install forever package
        run: npm install forever -g

      - name: Add npm global bin to PATH
        shell: bash
        run: echo "$(npm prefix -g)" >> "$GITHUB_PATH"

      - name: Reset DB for a clean, deterministic seed
        shell: bash
        # The self-hosted runner persists the filesystem; a stale/accumulated DB from a prior run
        # causes flaky failures (duplicate names, wrong grid counts) or a demo-state onboarding
        # redirect. Start each run from an empty DB so the API auto-seeds the default org/admin.
        run: rm -f apps/api/data/gauzy.sqlite3*

      - name: Run API in background
        run: yarn start:api:forever
        env:
          DEMO: 'false'

      - name: Build Web (gauzy) for static serving
        # The Angular dev server (nx serve gauzy) OOMs over a long e2e run. Build once and serve the
        # static output instead — stable + low memory. The app uses hash routing + an absolute API
        # URL (http://localhost:3000), so a plain static file server is sufficient (no proxy/SPA fallback).
        shell: bash
        run: yarn nx build gauzy -c local || { echo "::warning::gauzy build failed — retry 1 (nx cache skips done deps)"; yarn nx build gauzy -c local; }
        env:
          NX_NO_CLOUD: true
          NX_ISOLATE_PLUGINS: 'false'
          NX_DAEMON: 'false'
          NODE_OPTIONS: --max-old-space-size=24576

      - name: Serve Web (static) in background
        run: forever start apps/gauzy-e2e/tools/serve-web.js dist/apps/gauzy 4200

      - name: Install Playwright browser (chromium)
        run: npx playwright install --with-deps chromium

      - name: Wait for API and Web to be ready
        shell: bash
        # Poll both ports, but FAIL FAST if a server process has crashed (forever -> STOPPED)
        # instead of waiting out the whole window. Web is a static server (instant); the API seeds
        # a fresh DB (~5-7 min: migrations + seedDefault), so a 10-min cap is ample.
        run: |
          deadline=$((SECONDS + 600))   # 10 min hard cap
          while (( SECONDS < deadline )); do
            api=$(curl -s -o /dev/null -w '%{http_code}' --max-time 3 http://localhost:3000/api || true)
            web=$(curl -s -o /dev/null -w '%{http_code}' --max-time 3 http://localhost:4200 || true)
            echo "waiting (${SECONDS}s): api=$api web=$web"
            if [ "$api" != "000" ] && [ "$web" != "000" ]; then
              echo "✅ API (:3000) and Web (:4200) are up"; exit 0
            fi
            if npx forever list 2>/dev/null | grep -qi "STOPPED"; then
              echo "❌ A server process crashed (forever reports STOPPED) — aborting early."; exit 1
            fi
            sleep 6
          done
          echo "❌ Timed out after ${SECONDS}s waiting for API/Web"; exit 1

      - name: Server logs (diagnostic)
        if: always()
        shell: bash
        run: |
          npx forever list || true
          for f in "$HOME"/.forever/*.log; do
            [ -e "$f" ] || continue
            echo "===== $f ====="
            tail -120 "$f" || true
          done

      - name: Run Playwright tests
        working-directory: apps/gauzy-e2e
        run: npx playwright test
        env:
          CI: 'true'
          E2E_BASE_URL: http://localhost:4200

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: apps/gauzy-e2e/playwright-report
          retention-days: 14
